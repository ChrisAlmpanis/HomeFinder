<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="referrer" content="no-referrer"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Home Finder — Buyer Dashboard</title>
<link rel="stylesheet" href="css/shared.css"/>
<style>
.sb2{background:var(--gl)!important}
.sbu{background:#1a4a6b!important}
.sbav{background:#164070!important}
.mp{background:url('images/backgound.jpg') center/cover fixed no-repeat!important;position:relative;min-height:100vh}
.mp::before{content:'';position:absolute;inset:0;background:rgba(240,246,236,0.92);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:0}
.mp>*{position:relative;z-index:1}
.sc2{border-radius:12px!important}
.dt{border-radius:12px;overflow:hidden}
.sh{border-radius:8px}
.lc{background:rgba(255,255,255,0.7)!important;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);transition:transform 0.15s ease,box-shadow 0.15s ease;box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.lc:hover{transform:scale(1.03);box-shadow:0 12px 32px rgba(0,0,0,0.15)}
.sb2{background:rgba(207,227,194,0.6)!important;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.sbu{background:rgba(26,74,107,0.85)!important}
.dash-banner{
  background:url('images/backgound.jpg') center/cover fixed no-repeat!important;
  border-radius:12px;
  margin:12px;
  overflow:hidden;
  position:relative
}
.dash-banner::before{
  content:'';position:absolute;inset:0;
  background:rgba(90,122,78,0.55);
  z-index:1
}
.dash-banner>*{position:relative;z-index:2}
.dash-banner::before{
  content:'';position:absolute;inset:0;
  background:rgba(90,122,78,0.55);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  z-index:0
}
.dash-banner>*{position:relative;z-index:1}

.sb2{
  background:url('images/backgound.jpg') center/cover fixed no-repeat!important;
  position:relative;overflow:hidden
}
.sb2::before{
  content:'';position:absolute;inset:0;
  background:rgba(207,227,194,0.75);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  z-index:0
}
.sbu,.sbmenu,.sbav,.sbnm,.sbrl,.sbi{position:relative;z-index:1}
.sbu{background:rgba(26,74,107,0.85)!important}
</style>

</head>
<body>
<div class="toast" id="toast"></div>

<!-- RESCHEDULE MODAL -->
<div class="ov" id="rescMod">
  <div class="modal" style="max-width:520px">
    <div class="modal-hdr">
      <button class="modal-back" onclick="cm('rescMod')">← Back</button>
      <h2>Reschedule</h2>
      <span style="width:60px"></span>
    </div>
    <div class="modal-body">
      <p>Select a new available date for your appointment.</p>
      <div class="cal-grid" id="resc-cal"></div>
      <div class="fg" style="margin-top:12px"><label class="fl">New Date</label><input type="text" class="fi" id="resc-date" placeholder="Click a date above" readonly/></div>
      <div class="fg"><label class="fl">Time Slot</label><select class="fi" id="resc-time"><option>9:00 AM</option><option>10:00 AM</option><option>11:00 AM</option><option>2:00 PM</option><option>3:30 PM</option><option>5:00 PM</option></select></div>
      <div class="macts">
        <button class="bfu bfu-g" style="max-width:160px" onclick="confirmResc()">Reschedule</button>
        <button class="bfu bfu-o" style="max-width:110px" onclick="cm('rescMod')">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div class="m-overlay" id="mOv" onclick="closeMenu()"></div>
<div class="side-menu" id="sMenu">
  <div class="sm-top"><span class="sm-title">Home Finder</span><button class="sm-x" onclick="closeMenu()">×</button></div>
  <div class="sm-nav">
    <button class="sm-item" onclick="location.href='home.html'">Home</button>
    <button class="sm-item" onclick="location.href='messages.html'">Messages</button>
    <div class="sm-div"></div>
    <button class="sm-item" onclick="authLogout()">Sign Out</button>
  </div>
  <div class="sm-foot"><span>© 2024 Home Finder</span></div>
</div>
<nav>
  <div class="nav-left"><button class="hbtn" onclick="openMenu()"><span></span><span></span><span></span></button></div>
  <div class="nav-center"><button class="logo" onclick="location.href='home.html'">Home Finder</button></div>
  <div class="nav-right">
    <div class="prof-wrap">
      <div class="prof-btn" id="prof-btn" style="background:#1a4a6b" onclick="toggleProf()">JT</div>
      <div class="prof-drop" id="prof-drop">
        <div class="pd-head"><div class="pd-name" id="pd-name">James Thompson</div><div class="pd-role">Buyer</div></div>
        <button class="pd-item" onclick="closePd();openProfileModal()">Edit Profile</button>
        <button class="pd-item" onclick="authLogout()">Sign Out</button>
      </div>
    </div>
  </div>
</nav>
<main>
<div class="dl">
  <div class="sb2">
    <div class="sbu">
      <div class="sbav buyer-av" id="sb-av">JT</div>
      <div class="sbnm" id="sb-name">James Thompson</div>
      <div class="sbrl buyer">Buyer</div>
    </div>
    <div class="sbmenu">
      <button class="sbi" onclick="showTab('overview')">Overview</button>
      <button class="sbi" onclick="showTab('appointments')">My Appointments</button>
      <button class="sbi" onclick="showTab('saved')">Saved Listings</button>
    </div>
  </div>
  <div class="dash-inner">
    <div class="dash-banner" style="justify-content:center;align-items:center;text-align:center;position:relative">
      <button onclick="prevSlide()" style="position:absolute;left:16px;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:20px;width:32px;height:32px;border-radius:50%;cursor:pointer">‹</button>
      <div id="banner-txt">
        <h3 id="banner-h" style="font-size:20px;font-weight:700;color:#fff;margin-bottom:4px"></h3>
        <p id="banner-p" style="font-size:13px;color:rgba(255,255,255,.7)"></p>
      </div>
      <button onclick="nextSlide()" style="position:absolute;right:16px;background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:20px;width:32px;height:32px;border-radius:50%;cursor:pointer">›</button>
    </div>
    <div class="mp" id="mp"></div>
  </div>
</div>
<footer class="site-footer"><div class="footer-bottom"><div class="f-copy">© 2025 Home Finder. All rights reserved.</div><div class="f-legal"><a href="#">Privacy</a><a href="#">Terms</a></div></div></footer>
</main>

<!-- EDIT PROFILE MODAL -->
<div class="ov" id="profileMod">
  <div class="modal" style="max-width:440px;border-radius:16px;overflow:hidden;background:rgba(255,255,255,0.45);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)">
    <div class="modal-hdr">
      <button class="modal-back" onclick="cm('profileMod')">← Back</button>
      <h2>Edit Profile</h2>
      <span style="width:60px"></span>
    </div>
    <div class="modal-body">
      <div id="prof-err" class="emsg"></div>
      <div class="frow">
        <div class="fg"><label class="fl">First Name</label><input type="text" class="fi" id="ep-fn"/></div>
        <div class="fg"><label class="fl">Last Name</label><input type="text" class="fi" id="ep-ln"/></div>
      </div>
      <div class="fg"><label class="fl">Email</label><input type="email" class="fi" id="ep-email"/></div>
      <div class="fg"><label class="fl">Phone</label><input type="tel" class="fi" id="ep-phone" placeholder="+30 69X XXX XXXX" oninput="this.value=this.value.replace(/[^0-9+\s\-]/g,'').slice(0,20)"/></div>
      <div class="fdiv"><div class="fdl"></div><div class="fdt">Change Password</div><div class="fdl"></div></div>
      <div class="fg"><label class="fl">Current Password</label><input type="password" class="fi" id="ep-oldpw" placeholder="Enter current password"/></div>
      <div class="frow">
        <div class="fg"><label class="fl">New Password</label><input type="password" class="fi" id="ep-newpw" placeholder="Min 8 characters"/></div>
        <div class="fg"><label class="fl">Confirm</label><input type="password" class="fi" id="ep-conpw" placeholder="Repeat password"/></div>
      </div>
      <div class="macts">
        <button class="bfu bfu-g" style="max-width:140px" onclick="saveProfile()">Save Changes</button>
        <button class="bfu bfu-o" style="max-width:110px" onclick="cm('profileMod')">Cancel</button>
      </div>
    </div>
  </div>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
const slides=[
  {h:'Find Your New Home in Athens',p:'Browse houses, apartments and studios across the city', img:'images/home.jpg'},
  {h:'Find Your Next Office Space',p:'Discover commercial properties in prime locations', img:'images/office.jpg'},
  {h:'Invest in Athens Real Estate',p:'Explore top investment opportunities across Athens', img:'images/invest.jpg'},
  {h:'Book a Viewing Today',p:'Connect with verified sellers and arrange a visit', img:'images/book.jpg'},
];
let slideIdx=0;
function showSlide(i){
  slideIdx=(i+slides.length)%slides.length;
  const s=slides[slideIdx];
  document.getElementById('banner-h').textContent=s.h;
  document.getElementById('banner-p').textContent=s.p;
  document.querySelector('.dash-banner').style.backgroundImage=`url('${s.img}')`;
}
function nextSlide(){showSlide(slideIdx+1);}
function prevSlide(){showSlide(slideIdx-1);}
showSlide(0);
setInterval(()=>showSlide(slideIdx+1),4000);

const USER=getUser();
if(!USER||USER.role!=='buyer'){location.href='index.html';}
let APPTS=[];
let BOOKED=[];

async function loadData(){
  try{
    const [aRes, lRes] = await Promise.all([
      apiGetAppointments(),
      apiGetListings()
    ]);
    APPTS = aRes.appointments||[];
    LS = (lRes.listings||[]).map(l=>({
      ...l,
      id: l._id,
      price: l.listingMode==='rent' ? '€'+l.price+'/mo' : '€'+l.price.toLocaleString(),
      raw: l.price,
      address: l.location,
      img: l.files&&l.files[0] ? l.files[0].fileURL : '',
      beds: l.beds, baths: l.baths, type: l.type
    }));
  } catch(e){ console.error('Load error',e); }
}
let LS=[];
let rescId=null,rescDay=null;

if(USER){
  document.getElementById('prof-btn').textContent=USER.initials;
  document.getElementById('pd-name').textContent=USER.name;
  document.getElementById('sb-av').textContent=USER.initials;
  document.getElementById('sb-name').textContent=USER.name;
}

function myAppts(){
  return APPTS.filter(a=>{
    const bid = a.buyerID?._id || a.buyerID || '';
    return bid === USER._id || bid.toString() === USER._id;
  });
}

function showTab(t){
  document.querySelectorAll('.sbi').forEach((b,i)=>b.classList.toggle('on',['overview','appointments','saved'][i]===t));
  const mp=document.getElementById('mp');
  if(t==='overview'){
    const ma=myAppts();
    mp.innerHTML=`<div class="sh"><div><div class="stag">Buyer</div><h2>Overview</h2></div></div>
      <div class="srow" style="grid-template-columns:repeat(3,1fr)">
        <div class="sc2"><div class="sbig">${ma.length}</div><div class="slb">Appointments</div></div>
        <div class="sc2"><div class="sbig">${ma.filter(a=>a.status==='confirmed').length}</div><div class="slb">Confirmed</div></div>
        <div class="sc2"><div class="sbig">3</div><div class="slb">Saved Listings</div></div>
      </div>
      <div class="sh"><div><div class="stag">Upcoming</div><h2 style="font-size:16px">My Appointments</h2></div><button class="sh-link" onclick="showTab('appointments')">Manage →</button></div>
      <table class="dt"><thead><tr><th>Property</th><th>Date</th><th>Time</th><th>Status</th></tr></thead>
      <tbody>${ma.map(a=>{const prop=a.listingID?.title||a.listingID?.location||a.property||'—';const date=a.scheduledAt?new Date(a.scheduledAt).toLocaleDateString('el-GR'):a.date||'—';return`<tr><td>${prop}</td><td>${date}</td><td>${a.time||'—'}</td><td><span class="pill ${a.status}">${a.status}</span></td></tr>`;}).join('')}</tbody></table>`;
  } else if(t==='appointments'){
    const ma=myAppts();
    const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Athens'}));
    const todayD=now.getDate(), todayM=now.getMonth(), todayY=now.getFullYear();

    // Calendar state - allow current month and next month only
    if(typeof window.calMonth==='undefined'){window.calMonth=todayM;window.calYear=todayY;}
    const viewMonth=window.calMonth, viewYear=window.calYear;
  const maxMonth=todayM+1, maxYear=todayY+(todayM===11?1:0);
    const maxDate=new Date(todayY,todayM+1,todayD);

    const monthName=new Date(viewYear,viewMonth,1).toLocaleString('en-US',{month:'long'});
    const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
    const firstDay=new Date(viewYear,viewMonth,1).getDay();
    const offset=firstDay===0?6:firstDay-1;

    const selDay=window.calSelDay||todayD;
    const selM=window.calSelMonth!==undefined?window.calSelMonth:todayM;
    const selY=window.calSelYear||todayY;
    const bookedDates=ma.filter(a=>a.status!=='cancelled').map(a=>{
      const d=new Date(a.scheduledAt||a.date);
      return d.getMonth()===viewMonth&&d.getFullYear()===viewYear?d.getDate():null;
    }).filter(Boolean);
    const days=['Mo','Tu','We','Th','Fr','Sa','Su'];
    let cal=days.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--mu);padding:4px 0">${d}</div>`).join('');
    for(let i=0;i<offset;i++) cal+=`<div></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const isBooked=bookedDates.includes(d);
      const isToday=d===todayD&&viewMonth===todayM&&viewYear===todayY;
      const isSelected=d===selDay&&viewMonth===selM&&viewYear===selY;
      const isPast=(viewYear<todayY)||(viewYear===todayY&&viewMonth<todayM)||(viewYear===todayY&&viewMonth===todayM&&d<todayD)||(viewYear===todayY&&viewMonth===todayM&&d===todayD&&false);
      const thisDate=new Date(viewYear,viewMonth,d);
      const isFutureLocked=thisDate>maxDate;
      const crossed=isPast||isFutureLocked;
      cal+=`<div onclick="${!crossed?`selectCalDay(${d},${viewMonth},${viewYear})`:''}"
        style="text-align:center;cursor:${crossed?'default':'pointer'};border-radius:50%;
        ${isBooked?'background:var(--gd);color:#fff;font-weight:700;':''}
        ${isToday&&!isBooked?'border:2px solid var(--g);':''}
        ${isSelected&&!isToday?'border:2px solid var(--g);background:rgba(30,107,69,0.12);':''}
        ${crossed?'color:#ccc;text-decoration:line-through;':''}
        font-size:12px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;margin:auto"
        class="cal-day-btn" data-day="${d}" data-month="${viewMonth}" data-year="${viewYear}">${d}</div>`;
    }

    const hours=[];
    for(let h=8;h<=20;h++) hours.push(h);
    const timeSlots=hours.map(h=>{
      const appt=ma.find(a=>{
        const d=new Date(a.scheduledAt||a.date);
        return d.getDate()===selDay&&d.getMonth()===selM&&d.getFullYear()===selY&&(a.time||'').replace(/^0/,'').startsWith(h+':');
      });
      const freshNow=new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Athens'}));
      const nowH=freshNow.getHours();
      const isSelectedDayPast=(selY<todayY)||(selY===todayY&&selM<todayM)||(selY===todayY&&selM===todayM&&selDay<todayD);
      const isToday=selY===todayY&&selM===todayM&&selDay===todayD;
      const isPastHour=isSelectedDayPast||(isToday&&h<nowH);
      const isFutureDay=(selY>maxYear)||(selY===maxYear&&selM>maxMonth);
      const crossed=isPastHour||isFutureDay;
      return `<div style="border:1px solid var(--br);border-radius:8px;padding:6px 10px;display:flex;align-items:center;gap:8px;background:${appt?'rgba(90,122,78,0.12)':'rgba(255,255,255,0.6)'}">
        <span style="font-size:11px;color:var(--mu);width:40px;flex-shrink:0;${crossed?'text-decoration:line-through;color:#ccc':''}">${h}:00</span>
        ${appt?`<span style="font-size:11px;font-weight:600;color:var(--g);text-decoration:line-through">${appt.listingID?.title||appt.property||'Appointment'}</span>`
        :`<span style="font-size:11px;color:${crossed?'#ccc':'var(--li)'}${crossed?';text-decoration:line-through':''}">Available</span>`}
      </div>`;
    }).join('');

    // Nav buttons
    const canPrev=!(viewMonth===todayM&&viewYear===todayY);
    const canNext=!(viewMonth===maxMonth&&viewYear===maxYear);

    mp.innerHTML=`
      <div class="sh"><div><div class="stag">Buyer</div><h2>My Appointments</h2></div><button class="bsm bsm-g" style="padding:8px 18px;font-size:12px" onclick="location.href='browse.html'">+ Book New</button></div>
      <div style="display:grid;grid-template-columns:220px 1fr;gap:24px;margin-bottom:28px">
        <div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <button onclick="calNav(-1)" style="background:none;border:1px solid var(--br);border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:14px;${canPrev?'':'opacity:.3;cursor:default'}">‹</button>
            <div style="font-size:12px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.5px">${monthName} ${viewYear}</div>
            <button onclick="calNav(1)" style="background:none;border:1px solid var(--br);border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:14px;${canNext?'':'opacity:.3;cursor:default'}">›</button>
          </div>
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${cal}</div>
          <div style="margin-top:8px;font-size:10px;color:var(--mu)">&#9679; Booked &nbsp; &#8212; Past/unavailable</div>
        </div>
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--g);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px" id="time-label">${selDay}/${selM+1}/${selY}</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">${timeSlots}</div>
        </div>
      </div>
      <div class="sh"><div><div class="stag">All</div><h2 style="font-size:16px">Appointments</h2></div></div>
      ${ma.length?`<table class="dt"><thead><tr><th>Property</th><th>Location</th><th>Date</th><th>Time</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>${ma.map(a=>`<tr><td style="font-weight:600">${a.listingID?.title||a.listingID?.location||a.property||'&#8212;'}</td><td>${a.listingID?.location||a.loc||'&#8212;'}</td><td>${a.scheduledAt?new Date(a.scheduledAt).toLocaleDateString('el-GR'):a.date||'&#8212;'}</td><td>${a.time||'&#8212;'}</td><td><span class="pill ${a.status}">${a.status}</span></td>
        <td style="display:flex;gap:6px">
          ${a.status!=='cancelled'?`<button class="bsm bsm-g" style="padding:4px 10px;font-size:10px" onclick="openResc('${a._id||a.id}')">Reschedule</button>
          <button class="bsm bsm-o" style="padding:4px 10px;font-size:10px;color:#a03030;border-color:#f5c6c6" onclick="cancelAppt('${a._id||a.id}')">Cancel</button>`:'<span style="font-size:11px;color:var(--li)">&#8212;</span>'}
        </td></tr>`).join('')}</tbody></table>`
      :'<p style="color:var(--mu);font-size:13px;padding:20px 0">No appointments yet. <a href="browse.html" style="color:var(--g);font-weight:600">Browse listings</a> to book a viewing.</p>'}`;
    } else if(t==='saved'){
    const saved = JSON.parse(sessionStorage.getItem('hf_saved')||'[]');
    const savedListings = LS.filter(l=>saved.includes(l.id||l._id));
    mp.innerHTML=`<div class="sh"><div><div class="stag">Buyer</div><h2>Saved Listings</h2></div></div>
      ${savedListings.length?
        `<div class="lg">${savedListings.map(l=>`
          <div class="lc" onclick="sessionStorage.setItem('hf_listing_id','${l.id||l._id}');location.href='listing.html'">
            <div class="li-img">${l.img?`<img src="${l.img}" alt="${l.address}" loading="lazy" referrerpolicy="no-referrer"/>`:'<span>Photo</span>'}<div class="li-badge">${l.type}</div></div>
            <div class="li-body"><div class="li-price">${l.price}</div><div class="li-addr">${l.address}</div><div class="li-meta"><span>${l.beds} Bed</span><span>${l.baths} Bath</span></div>
            <div class="li-acts"><button class="bsm bsm-o" style="color:#a03030;border-color:#f5c6c6" onclick="event.stopPropagation();removeSaved('${l.id||l._id}')">Remove</button></div>
            </div>
          </div>`).join('')}</div>`
        :'<p style="color:var(--mu);font-size:13px;padding:20px 0">No saved listings yet. <a href="browse.html" style="color:var(--g);font-weight:600">Browse listings</a> and click ♡ to save them.</p>'}`;
  } else if(t==='profile'){
    const nm=USER.name.split(' ');
    mp.innerHTML=`<div class="sh"><div><div class="stag">Buyer</div><h2>Edit Profile</h2></div></div>
      <div style="max-width:400px">
        <div class="frow"><div class="fg"><label class="fl">First Name</label><input type="text" class="fi" value="${nm[0]||'James'}"/></div><div class="fg"><label class="fl">Last Name</label><input type="text" class="fi" value="${nm[1]||'Thompson'}"/></div></div>
        <div class="fg"><label class="fl">Email</label><input type="email" class="fi" value="james.t@email.com"/></div>
        <div class="fg"><label class="fl">Phone</label><input type="tel" class="fi" value="+1 (503) 555-0201"/></div>
        <button class="bsm bsm-g" style="padding:10px 24px;font-size:12px;margin-top:8px" onclick="toast('Profile saved')">Save Changes</button>
      </div>`;
  }
}

function openL(id){sessionStorage.setItem('hf_cur',id);location.href='home.html';}

async function cancelAppt(id){
  try{
    await apiCancelAppointment(id);
    const a=APPTS.find(x=>(x._id||x.id)===id);
    if(a)a.status='cancelled';
    toast('Appointment cancelled.');
    loadData().then(()=>showTab('appointments'));
  } catch(e){ toast('Error cancelling appointment.'); }
}

function buildRescCal(){
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  BOOKED=[];
  let html=days.map(d=>`<div class="cal-head">${d}</div>`).join('');
  // April 2024: starts Monday (offset=0), 30 days
  for(let d=1;d<=30;d++){
    const booked=BOOKED.includes(d);
    const past=d<=6;
    html+=`<div class="cal-day${booked?' booked':past?' past':''}" onclick="selRescDay(${d},this)"><div class="cal-day-num">${d}</div>${booked?'<div class="cal-booked-lbl">Booked</div>':''}</div>`;
  }
  // pad remaining cells (30 days fills exactly with no pad since 30%7=2, need 5 more)
  const pad=(7-(30%7))%7;
  for(let i=0;i<pad;i++) html+=`<div class="cal-day past" style="min-height:64px"></div>`;
  document.getElementById('resc-cal').innerHTML=html;
}

function openResc(id){
  rescId=id;rescDay=null;
  document.getElementById('resc-date').value='';
  buildRescCal();
  om('rescMod');
}
function selRescDay(d,el){
  if(el.classList.contains('booked')){toast('Already booked.');return;}
  document.querySelectorAll('#resc-cal .cal-day').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('resc-date').value='Apr '+d+', 2024';
  rescDay=d;
}
async function confirmResc(){
  if(!rescDay){toast('Select a new date first.');return;}
  try{
    const time=document.getElementById('resc-time').value;
    await apiRescheduleAppointment(rescId,{scheduledAt:new Date(2026,3,rescDay),time,status:'confirmed'});
    const a=APPTS.find(x=>(x._id||x.id)===rescId);
    if(a){a.scheduledAt=new Date(2026,3,rescDay);a.time=time;a.status='confirmed';}
    cm('rescMod');
    toast('Appointment rescheduled to May '+rescDay+'!');
    loadData().then(()=>showTab('appointments'));
  } catch(e){ toast('Error rescheduling.'); }
}

function openProfileModal(){
  const nm=USER.name.split(' ');
  document.getElementById('ep-fn').value=nm[0]||'';
  document.getElementById('ep-ln').value=nm[1]||'';
  document.getElementById('ep-email').value=USER.email||'';
  document.getElementById('ep-phone').value='';
  document.getElementById('profileMod').classList.add('on');
}
function saveProfile(){
  const fn = document.getElementById('ep-fn').value.trim();
  const ln = document.getElementById('ep-ln').value.trim();
  const email = document.getElementById('ep-email').value.trim();
  const phone = document.getElementById('ep-phone').value.trim();
  const oldpw = document.getElementById('ep-oldpw').value;
  const newpw = document.getElementById('ep-newpw').value;
  const conpw = document.getElementById('ep-conpw').value;
  const err = document.getElementById('prof-err');
  err.style.display='none';

  // Validate name - no numbers
  if(!fn||!ln){ err.textContent='First and last name are required.'; err.style.display='block'; return; }
  if(/\d/.test(fn)||/\d/.test(ln)){ err.textContent='Name cannot contain numbers.'; err.style.display='block'; return; }

  // Validate phone - no letters, max 20 digits
  if(phone && (/[a-zA-Z]/.test(phone) || phone.replace(/\D/g,'').length > 20)){
    err.textContent='Phone must contain only numbers, max 20 digits.'; err.style.display='block'; return;
  }

  // Validate password if entered
  if(oldpw || newpw || conpw){
    if(!oldpw){ err.textContent='Enter your current password.'; err.style.display='block'; return; }
    if(newpw.length < 8){ err.textContent='New password must be at least 8 characters.'; err.style.display='block'; return; }
    if(newpw !== conpw){ err.textContent='Passwords do not match.'; err.style.display='block'; return; }
  }

  USER.name = fn+' '+ln;
  USER.initials = (fn[0]+ln[0]).toUpperCase();
  if(email) USER.email = email;
  saveUser(USER);
  document.getElementById('sb-name').textContent = USER.name;
  document.getElementById('sb-av').textContent = USER.initials;
  document.getElementById('prof-btn').textContent = USER.initials;
  cm('profileMod');
  toast('Profile saved!');
}
function calNav(dir){
  const now=new Date(new Date().toLocaleString('en-US',{timeZone:'Europe/Athens'}));
  const todayM=now.getMonth(), todayY=now.getFullYear();
  const maxM=todayM+1, maxY=todayY+(todayM===11?1:0);
  let m=(window.calMonth||todayM)+dir;
  let y=window.calYear||todayY;
  if(m<0){m=11;y--;}if(m>11){m=0;y++;}
  if(y<todayY||(y===todayY&&m<todayM))return;
  if(y>maxY||(y===maxY&&m>maxM))return;
  window.calMonth=m;window.calYear=y;
  showTab('appointments');
}
function selectCalDay(d,m,y){
  window.calSelDay=d;
  window.calSelMonth=m;
  window.calSelYear=y;
  showTab('appointments');
}
function removeSaved(id){
  let saved=JSON.parse(sessionStorage.getItem('hf_saved')||'[]');
  saved=saved.filter(x=>x!==id);
  sessionStorage.setItem('hf_saved',JSON.stringify(saved));
  showTab('saved');
  toast('Removed from saved listings.');
}
