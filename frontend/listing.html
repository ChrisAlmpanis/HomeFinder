<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="referrer" content="no-referrer"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Home Finder — Listing</title>
<link rel="stylesheet" href="css/shared.css"/>
<style>
main{flex:1;display:flex;flex-direction:column}
body{background:url('images/backgound.jpg') center/cover fixed no-repeat}
body::before{content:'';position:fixed;inset:0;background:rgba(240,246,236,0.92);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:0}
main,nav{position:relative;z-index:1}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;align-items:center;justify-content:center}.ov.on{display:flex}
.modal{max-width:440px;width:100%;position:relative;max-height:90vh;overflow-y:auto;border-radius:16px;overflow:hidden;background:rgba(255,255,255,0.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--br);background:var(--g);color:#fff}
.modal-hdr h2{font-size:16px;font-weight:700}
.modal-back{background:none;border:none;color:rgba(255,255,255,.8);font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer}.modal-back:hover{color:#fff}
.modal-body{padding:22px}
.macts{display:flex;gap:10px;margin-top:16px}
.dh{padding:16px 24px 0;background:transparent}
.dh-inner{position:relative;height:380px;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.15);background:#d0e8d8}
.dh-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1}
.dh-overlay{position:absolute;inset:0;background:linear-gradient(rgba(0,0,0,.1),rgba(0,0,0,.35));z-index:2}
.dh-ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--li);text-transform:uppercase;letter-spacing:1px}
.dh-back{position:absolute;top:14px;left:14px;background:rgba(0,0,0,0.35);backdrop-filter:blur(6px);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;z-index:4;border-radius:8px}.dh-back:hover{background:rgba(0,0,0,0.55)}
.dh-badge{position:absolute;bottom:14px;left:14px;background:rgba(0,0,0,0.45);backdrop-filter:blur(6px);color:#fff;padding:6px 14px;font-size:13px;font-weight:700;z-index:4;border-radius:8px}
.dh-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.4);color:#fff;border:none;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer;z-index:4;display:flex;align-items:center;justify-content:center}.dh-arrow:hover{background:rgba(0,0,0,0.65)}
.dh-arrow-l{left:12px}.dh-arrow-r{right:12px}
.dh-maximize{position:absolute;top:14px;right:14px;background:rgba(0,0,0,0.35);backdrop-filter:blur(6px);color:#fff;border:1px solid rgba(255,255,255,0.3);width:34px;height:34px;border-radius:8px;font-size:15px;cursor:pointer;z-index:4;display:flex;align-items:center;justify-content:center}.dh-maximize:hover{background:rgba(0,0,0,0.6)}
.dh-dots{display:flex;justify-content:center;gap:6px;padding:10px 0 4px}
.dh-dot{width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,0.25);cursor:pointer;transition:background .2s}.dh-dot.on{background:var(--g)}
.dh-fullscreen{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;align-items:center;justify-content:center}.dh-fullscreen.on{display:flex}
.dh-fullscreen img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:8px}
.dh-fs-close{position:absolute;top:20px;right:24px;color:#fff;font-size:32px;cursor:pointer;background:none;border:none;line-height:1}
.detail-grid{display:grid;grid-template-columns:1fr 300px;flex:1}
.dm{padding:36px 40px;border-right:1px solid var(--br)}
.ds{padding:28px;background:transparent}
.dp{font-size:34px;font-weight:700;color:var(--g);margin-bottom:6px}
.da{font-size:14px;color:var(--mu);margin-bottom:28px;font-weight:500}
.specs{display:flex;gap:28px;padding-bottom:24px;border-bottom:1px solid var(--br);margin-bottom:24px}
.spec-item{text-align:center}
.sv{font-size:22px;font-weight:700;color:var(--bl)}.sl2{font-size:10px;color:var(--mu);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.ddesc{font-size:14px;color:#444;line-height:1.75;margin-bottom:24px}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--g);margin-bottom:12px}
.ds-card{background:#fff;padding:16px;border-radius:12px;margin-bottom:16px;border:none;box-shadow:0 2px 8px rgba(0,0,0,0.07)}
.seller-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.av{width:42px;height:42px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.sn{font-size:14px;font-weight:600}.si2{font-size:11px;color:var(--mu);margin-top:2px}
.bbook{width:100%;padding:12px;background:var(--g);color:#fff;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border:none;margin-bottom:10px;cursor:pointer;border-radius:8px}.bbook:hover{background:var(--gd)}
.bbook-out{width:100%;padding:11px;background:transparent;color:var(--g);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border:2px solid var(--g);margin-bottom:10px;cursor:pointer;border-radius:8px}.bbook-out:hover{background:var(--gl)}
.bchat{width:100%;padding:11px;background:#fff;color:var(--g);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border:2px solid var(--g);cursor:pointer;border-radius:8px}.bchat:hover{background:var(--gl)}
.contact-info{font-size:13px;color:var(--mu);line-height:2.2;margin-top:8px}
.aslot{padding:9px 12px;background:var(--gl);font-size:12px;color:var(--g);margin-bottom:6px;border-radius:8px}
.tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.tag{padding:5px 14px;background:var(--gl);font-size:12px;color:var(--g);font-weight:500;border-radius:20px}
@media(max-width:768px){.detail-grid{grid-template-columns:1fr}.ds{border-top:1px solid var(--br)}.specs{gap:16px}.dm{padding:24px 20px}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- Profile Modal (in DOM before scripts) -->
<div class="ov" id="profileMod">
  <div class="modal">
    <div class="modal-hdr">
      <button class="modal-back" onclick="closeProfileModal()">← Back</button>
      <h2>Edit Profile</h2>
      <span style="width:60px"></span>
    </div>
    <div class="modal-body">
      <div id="prof-err" class="emsg" style="display:none"></div>
      <div class="frow">
        <div class="fg"><label class="fl">First Name</label><input type="text" class="fi" id="ep-fn"/></div>
        <div class="fg"><label class="fl">Last Name</label><input type="text" class="fi" id="ep-ln"/></div>
      </div>
      <div class="fg"><label class="fl">Email</label><input type="email" class="fi" id="ep-email"/></div>
      <div class="fg"><label class="fl">Phone</label><input type="tel" class="fi" id="ep-phone" placeholder="+30 69X XXX XXXX"/></div>
      <div class="fdiv"><div class="fdl"></div><div class="fdt">Change Password</div><div class="fdl"></div></div>
      <div class="fg"><label class="fl">Current Password</label><input type="password" class="fi" id="ep-oldpw" placeholder="Enter current password"/></div>
      <div class="frow">
        <div class="fg"><label class="fl">New Password</label><input type="password" class="fi" id="ep-newpw" placeholder="Min 8 characters"/></div>
        <div class="fg"><label class="fl">Confirm</label><input type="password" class="fi" id="ep-conpw" placeholder="Repeat password"/></div>
      </div>
      <div class="macts">
        <button class="bfu bfu-g" style="max-width:140px" onclick="saveProfile()">Save Changes</button>
        <button class="bfu bfu-o" style="max-width:110px" onclick="closeProfileModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- Fullscreen viewer -->
<div class="dh-fullscreen" id="dh-fullscreen">
  <button class="dh-fs-close" onclick="closeFullscreen()">×</button>
  <img id="dh-fs-img" src="" alt=""/>
</div>

<!-- Side menu -->
<div class="m-overlay" id="mOv" onclick="closeMenu()"></div>
<div class="side-menu" id="sMenu">
  <div class="sm-top"><span class="sm-title">Home Finder</span><button class="sm-x" onclick="closeMenu()">×</button></div>
  <div class="sm-nav">
    <button class="sm-item" onclick="location.href='home.html'">Home</button>
    <button class="sm-item" onclick="location.href='browse.html'">Browse Listings</button>
    <button class="sm-item" onclick="location.href='messages.html'">Messages</button>
    <div class="sm-div"></div>
    <button class="sm-item" onclick="goDash()">My Dashboard</button>
    <button class="sm-item" onclick="authLogout()">Sign Out</button>
  </div>
  <div class="sm-foot"><span>© 2025 Home Finder</span></div>
</div>

<nav>
  <div class="nav-left"><button class="hbtn" onclick="openMenu()"><span></span><span></span><span></span></button></div>
  <div class="nav-center"><button class="logo" onclick="location.href='home.html'">Home Finder</button></div>
  <div class="nav-right">
    <div class="prof-wrap">
      <div class="prof-btn" id="prof-btn" onclick="toggleProf()">?</div>
      <div class="prof-drop" id="prof-drop">
        <div class="pd-head"><div class="pd-name" id="pd-name">User</div><div class="pd-role" id="pd-role">Member</div></div>
        <div id="pd-links"></div>
      </div>
    </div>
  </div>
</nav>

<main>
  <div class="dh">
    <div class="dh-inner" id="dh-inner">
      <div class="dh-ph" id="dh-ph">Loading...</div>
      <div class="dh-overlay"></div>
      <button class="dh-back" onclick="location.href='browse.html'">← Back to Listings</button>
      <div class="dh-badge" id="dh-badge"></div>
      <button class="dh-arrow dh-arrow-l" id="dh-prev" onclick="changePhoto(-1)">‹</button>
      <button class="dh-arrow dh-arrow-r" id="dh-next" onclick="changePhoto(1)">›</button>
      <button class="dh-maximize" onclick="openFullscreen()">⛶</button>
    </div>
    <div class="dh-dots" id="dh-dots"></div>
  </div>
  <div class="detail-grid" id="det-body">
    <div class="dm" style="display:flex;align-items:center;justify-content:center;color:var(--mu)">Loading listing...</div>
    <div class="ds"></div>
  </div>
  <footer class="site-footer"><div class="footer-bottom"><div class="f-copy">© 2025 Home Finder. All rights reserved.</div><div class="f-legal"><a href="#">Privacy</a><a href="#">Terms</a></div></div></footer>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
const USER = getUser();
if(!USER){ location.href='index.html'; }

/* ── NAV SETUP ── */
if(USER){
  const pb = document.getElementById('prof-btn');
  pb.textContent = USER.initials||'?';
  if(USER.role==='buyer') pb.style.background='#1a4a6b';
  document.getElementById('pd-name').textContent = USER.name;
  document.getElementById('pd-role').textContent = USER.role.charAt(0).toUpperCase()+USER.role.slice(1);
  const dash = USER.role==='admin'?'admin-dash.html':USER.role==='seller'?'seller-dash.html':'buyer-dash.html';
  if(USER.role==='buyer'){
    document.getElementById('pd-links').innerHTML=
      '<button class="pd-item" onclick="event.stopPropagation();closePd();openProfileModal()">Edit Profile</button>'+
      '<button class="pd-item" onclick="authLogout()">Sign Out</button>';
  } else {
    document.getElementById('pd-links').innerHTML=
      '<button class="pd-item" onclick="location.href=\''+dash+'\'">My Dashboard</button>'+
      '<button class="pd-item" onclick="authLogout()">Sign Out</button>';
  }
}

function goDash(){
  if(!USER) return;
  location.href = USER.role==='admin'?'admin-dash.html':USER.role==='seller'?'seller-dash.html':'buyer-dash.html';
}

/* ── GALLERY ── */
var _photos=[], _idx=0;

function renderPhoto(idx){
  if(!_photos.length) return;
  _idx = (idx+_photos.length)%_photos.length;
  var old = document.getElementById('dh-img');
  if(old) old.remove();
  var img = document.createElement('img');
  img.id='dh-img'; img.className='dh-img';
  img.referrerPolicy='no-referrer';
  img.onerror=function(){this.onerror=null;this.src='https://picsum.photos/seed/homefinder/1200/500';};
  img.src=_photos[_idx];
  var inner=document.getElementById('dh-inner');
  inner.insertBefore(img, inner.firstChild);
  document.getElementById('dh-ph').style.display='none';
  document.querySelectorAll('.dh-dot').forEach(function(d,i){d.classList.toggle('on',i===_idx);});
}
function changePhoto(dir){ renderPhoto(_idx+dir); }
function openFullscreen(){
  if(!_photos.length) return;
  document.getElementById('dh-fs-img').src=_photos[_idx];
  document.getElementById('dh-fullscreen').classList.add('on');
}
function closeFullscreen(){ document.getElementById('dh-fullscreen').classList.remove('on'); }

/* ── LOAD LISTING ── */
async function loadListing(){
  var id=sessionStorage.getItem('hf_listing_id');
  if(!id){ location.href='browse.html'; return; }
  try{
    var res=await apiGetListing(id);
    var l=res.listing;
    if(!l){ location.href='browse.html'; return; }
    var isRent=l.listingMode==='rent';
    var price=isRent?'€'+l.price+'/mo':'€'+Number(l.price).toLocaleString();
    _photos=l.files&&l.files.length?l.files.map(function(f){return f.fileURL;}):['https://picsum.photos/seed/homefinder/1200/500'];
    var seller=l.sellerID?(l.sellerID.name||'Seller'):'Seller';
    var si=seller.substring(0,2).toUpperCase();
    var city=l.location.split(',')[0].trim();
    document.title='Home Finder — '+l.location;
    document.getElementById('dh-badge').textContent=price+' · '+l.type;
    renderPhoto(0);
    var dotsEl=document.getElementById('dh-dots');
    if(_photos.length>1){
      dotsEl.innerHTML=_photos.map(function(_,i){return '<div class="dh-dot'+(i===0?' on':'')+'" onclick="renderPhoto('+i+')"></div>';}).join('');
    } else {
      document.getElementById('dh-prev').style.display='none';
      document.getElementById('dh-next').style.display='none';
    }
    document.getElementById('det-body').innerHTML=
      '<div class="dm">'+
        '<div class="dp">'+price+'</div>'+
        '<div class="da">📍 '+l.location+'</div>'+
        '<div class="specs">'+
          '<div class="spec-item"><div class="sv">'+l.beds+'</div><div class="sl2">Bedrooms</div></div>'+
          '<div class="spec-item"><div class="sv">'+l.baths+'</div><div class="sl2">Bathrooms</div></div>'+
          '<div class="spec-item"><div class="sv">'+(l.sqft||'—')+'</div><div class="sl2">Size</div></div>'+
          '<div class="spec-item"><div class="sv">'+l.type+'</div><div class="sl2">Type</div></div>'+
        '</div>'+
        '<div class="tag-row">'+
          '<span class="tag">'+(isRent?'For Rent':'For Sale')+'</span>'+
          '<span class="tag">'+city+'</span>'+
          '<span class="tag">'+l.beds+' bed · '+l.baths+' bath</span>'+
        '</div>'+
        '<p class="ddesc">'+(l.description||'No description available.')+'</p>'+
      '</div>'+
      '<div class="ds">'+
        '<div class="ds-card">'+
          '<div class="sec-title">Listed By</div>'+
          '<div class="seller-row"><div class="av">'+si+'</div><div><div class="sn">'+seller+'</div><div class="si2">✓ Verified Seller</div></div></div>'+
          (USER.role==='buyer'?
            '<button class="bbook-out" onclick="toggleSave()">♡ Save Listing</button>'+
            '<button class="bbook" onclick="toast(\'Booking coming soon!\')">Book a Viewing</button>'+
            '<button class="bchat" onclick="location.href=\'messages.html\'">Message Seller</button>':
            '<div style="font-size:12px;color:var(--mu)">Log in as a buyer to book or message.</div>')+
        '</div>'+
        '<div class="ds-card">'+
          '<div class="sec-title">Contact</div>'+
          '<div class="contact-info">'+
            '<div>✉ '+seller.toLowerCase().replace(/\s/g,'.')+'@homefinder.gr</div>'+
            '<div>📞 +30 210 555 0100</div>'+
          '</div>'+
        '</div>'+
        '<div class="ds-card">'+
          '<div class="sec-title">Available Slots</div>'+
          [5,8,12,15,19].map(function(d){return '<div class="aslot">May '+d+' — 10:00 AM</div>';}).join('')+
        '</div>'+
      '</div>';
  } catch(e){
    console.error('LISTING ERROR:',e);
    document.getElementById('det-body').innerHTML='<div class="dm" style="padding:40px;color:var(--mu)">Could not load listing.</div><div class="ds"></div>';
  }
}

/* ── MENUS ── */
function openMenu(){document.getElementById('mOv').classList.add('on');document.getElementById('sMenu').classList.add('on');}
function closeMenu(){document.getElementById('mOv').classList.remove('on');document.getElementById('sMenu').classList.remove('on');}
function closePd(){document.getElementById('prof-drop').classList.remove('on');}
function toggleProf(){document.getElementById('prof-drop').classList.toggle('on');}
document.addEventListener('click',function(e){
  if(!e.target.closest('.prof-wrap')) closePd();
});
document.getElementById('profileMod').addEventListener('click',function(e){if(e.target===this)closeProfileModal();});

/* ── PROFILE ── */
function openProfileModal(){
  var nm=(USER.name||'').split(' ');
  document.getElementById('ep-fn').value=nm[0]||'';
  document.getElementById('ep-ln').value=nm[1]||'';
  document.getElementById('ep-email').value=USER.email||'';
  document.getElementById('ep-phone').value='';
  document.getElementById('ep-oldpw').value='';
  document.getElementById('ep-newpw').value='';
  document.getElementById('ep-conpw').value='';
  document.getElementById('prof-err').style.display='none';
  document.getElementById('profileMod').classList.add('on');
}
function closeProfileModal(){document.getElementById('profileMod').classList.remove('on');}
function saveProfile(){
  var fn=document.getElementById('ep-fn').value.trim();
  var ln=document.getElementById('ep-ln').value.trim();
  var email=document.getElementById('ep-email').value.trim();
  var oldpw=document.getElementById('ep-oldpw').value;
  var newpw=document.getElementById('ep-newpw').value;
  var conpw=document.getElementById('ep-conpw').value;
  var err=document.getElementById('prof-err');
  err.style.display='none';
  if(!fn||!ln){err.textContent='First and last name are required.';err.style.display='block';return;}
  if(/\d/.test(fn)||/\d/.test(ln)){err.textContent='Name cannot contain numbers.';err.style.display='block';return;}
  if(oldpw||newpw||conpw){
    if(!oldpw){err.textContent='Enter your current password.';err.style.display='block';return;}
    if(newpw.length<8){err.textContent='New password must be at least 8 characters.';err.style.display='block';return;}
    if(newpw!==conpw){err.textContent='Passwords do not match.';err.style.display='block';return;}
  }
  USER.name=fn+' '+ln;
  USER.initials=(fn[0]+ln[0]).toUpperCase();
  if(email) USER.email=email;
  saveUser(USER);
  document.getElementById('prof-btn').textContent=USER.initials;
  document.getElementById('pd-name').textContent=USER.name;
  closeProfileModal();
  toast('Profile saved!');
}

/* ── MISC ── */
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('on');},3000);}
function toggleSave(){
  var id=sessionStorage.getItem('hf_listing_id');
  var saved=JSON.parse(sessionStorage.getItem('hf_saved')||'[]');
  if(saved.includes(id)){saved=saved.filter(function(x){return x!==id;});toast('Removed from saved.');}
  else{saved.push(id);toast('Listing saved!');}
  sessionStorage.setItem('hf_saved',JSON.stringify(saved));
}

loadListing();
</script>
</body>
</html>
