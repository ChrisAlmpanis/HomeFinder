<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Home Finder — Sign In</title>
<link rel="stylesheet" href="css/shared.css"/>
<style>
body{background:none;display:block;min-height:100vh}
.login-wrap{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:
    linear-gradient(rgba(15,70,38,0.72),rgba(8,48,24,0.82)),
    url('https://images.unsplash.com/photo-1555993539-1732b0258235?w=1920&h=1080&fit=crop&q=80') center/cover no-repeat;
  padding:24px;
}
.login-box{background:rgba(255,255,255,0.15);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);width:100%;max-width:400px;border:1px solid rgba(255,255,255,0.25);border-radius:16px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.login-header{background:var(--g);padding:24px;text-align:center;color:var(--w)}
.login-header h1{font-size:22px;font-weight:700;margin-bottom:4px}
.login-header p{font-size:13px;color:rgba(255,255,255,.7)}
.login-body{padding:28px;background:transparent}
.spinner{display:none;text-align:center;padding:8px 0;font-size:13px;color:var(--mu)}
.fi{background:rgba(255,255,255,0.85);border:1px solid rgba(255,255,255,0.4);color:#111}
.fl{color:rgba(255,255,255,0.9)}
.lbtn{color:rgba(255,255,255,0.85)}
.fdl{background:rgba(255,255,255,0.3)}
.fdt{color:rgba(255,255,255,0.6)}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-header">
      <h1>Home Finder</h1>
      <p>Sign in to your account to continue</p>
    </div>
    <div class="login-body">
      <div class="emsg" id="lerr">Incorrect email or password.</div>
      <div class="fg">
        <label class="fl">Email</label>
        <input type="email" class="fi" id="lu" placeholder="you@email.com" autofocus/>
      </div>
      <div class="fg">
        <label class="fl">Password</label>
        <div style="position:relative">
          <input type="password" class="fi" id="lp" placeholder="••••••••"
            onkeydown="if(event.key==='Enter')doLogin()" style="padding-right:40px"/>
          <button type="button" id="eyeBtn" onclick="togglePw()"
            style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(0,0,0,0.5);font-size:16px;line-height:1;padding:0">
            👁
          </button>
        </div>
      </div>
      <div style="text-align:right;margin-bottom:20px;margin-top:4px">
        <button class="lbtn" onclick="toast('Password reset coming soon.')">Forgot password?</button>
      </div>
      <div class="spinner" id="spinner">Signing in...</div>
      <button class="bfu bfu-g" id="loginBtn" onclick="doLogin()">Sign In</button>
      <div class="fdiv"><div class="fdl"></div><div class="fdt">or</div><div class="fdl"></div></div>
      <button class="bfu bfu-o" onclick="location.href='signup.html'">Create Account</button>
      <p style="font-size:11px;color:var(--li);margin-top:18px;text-align:center;line-height:1.8">
        Demo logins:<br/>
        Seller: <strong style="color:var(--mu)">sarah.m@homefinder.com</strong> / <strong style="color:var(--mu)">pass123</strong><br/>
        Buyer: <strong style="color:var(--mu)">james.t@homefinder.com</strong> / <strong style="color:var(--mu)">buyer123</strong><br/>
        Admin: <strong style="color:var(--mu)">admin@homefinder.com</strong> / <strong style="color:var(--mu)">12345678</strong>
      </p>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
if (getUser()) {
  const u = getUser();
  location.href = u.role === 'admin' ? 'admin-dash.html'
               : u.role === 'seller' ? 'seller-dash.html'
               : 'home.html';
}

async function doLogin() {
  const email    = document.getElementById('lu').value.trim();
  const password = document.getElementById('lp').value;
  const errEl    = document.getElementById('lerr');
  const spinner  = document.getElementById('spinner');
  const btn      = document.getElementById('loginBtn');

  errEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  spinner.style.display = 'block';

  try {
    const data = await apiLogin(email, password);

    if (data.error) {
      errEl.textContent = data.error;
      errEl.style.display = 'block';
      return;
    }

    saveUser({
      _id:        data.user._id,
      name:       data.user.name,
      email:      data.user.email,
      role:       data.user.role,
      initials:   data.user.name.substring(0, 2).toUpperCase(),
      isApproved: data.user.isApproved,
      token:      data.token
    });

    toast('Welcome, ' + data.user.name + '!');

    setTimeout(() => {
      if (data.user.role === 'admin')       location.href = 'admin-dash.html';
      else if (data.user.role === 'seller') location.href = 'seller-dash.html';
      else                                  location.href = 'home.html';
    }, 600);

  } catch (err) {
    errEl.textContent = 'Server error. Make sure the backend is running.';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
    spinner.style.display = 'none';
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('on'), 3000);
}

const eyeOpen = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
const eyeClosed = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

function togglePw() {
  const input = document.getElementById('lp');
  const btn = document.getElementById('eyeBtn');
  if (input.type === 'password') {
    input.type = 'text';
    btn.innerHTML = eyeClosed;
  } else {
    input.type = 'password';
    btn.innerHTML = eyeOpen;
  }
}
</script>
</body>
</html>
