<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Home Finder — Messages</title>
<link rel="stylesheet" href="css/shared.css"/>
<style>
body{background:url('images/backgound.jpg') center/cover fixed no-repeat}
body::before{content:'';position:fixed;inset:0;background:rgba(207,227,194,0.88);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:0}
nav{position:relative;z-index:400}main, .chat-page-wrap{position:relative;z-index:1}
.prof-wrap{position:relative;z-index:500}
.prof-drop{background:#fff!important;border:1px solid #ddd;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.sys-msg-chat{border-radius:20px!important}
.convo-list{background:rgba(207,227,194,0.5)!important}
.convo-search input{background:rgba(255,255,255,0.6);border-radius:8px}
.convo-item{border-radius:8px;margin:4px 8px;width:calc(100% - 16px)}
.bubble.them, .cp-bub.them-b{border-radius:18px 18px 18px 4px!important}
.bubble.me, .cp-bub.me-b{border-radius:18px 18px 4px 18px!important}
.chat-input-row, .cp-input-row{border-radius:12px!important;overflow:hidden}
.chat-input-row textarea, .cp-input-row textarea{border-radius:12px 0 0 12px}
.chat-send, .cp-send{border-radius:0 12px 12px 0!important}
.chat-main, .chat-msgs{background:transparent}
.chat-topbar{background:rgba(255,255,255,0.5);backdrop-filter:blur(4px)}
.chat-input-area{background:rgba(255,255,255,0.5);backdrop-filter:blur(4px)}
.convo-list{background:rgba(207,227,194,0.6)}
.bubble.them{background:rgba(255,255,255,0.75)}
.prop-ref-bar{background:rgba(207,227,194,0.4)!important}
.chat-page-wrap{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 56px)}
.convo-list{border-right:1px solid var(--br);background:#fff;display:flex;flex-direction:column}
.convo-hdr{padding:16px 18px;background:var(--g);color:#fff}
.convo-hdr h3{font-size:14px;font-weight:700}
.convo-hdr p{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px}
.convo-search{padding:10px 14px;border-bottom:1px solid var(--br)}
.convo-search input{width:100%;padding:8px 10px;border:1px solid var(--br);font-size:12px;font-family:'Inter',sans-serif;outline:none;background:var(--off)}
.convo-search input:focus{border-color:var(--g)}
.convo-items{flex:1;overflow-y:auto}
.convo-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--br);cursor:pointer;transition:background .1s}
.convo-item:hover{background:var(--off)}.convo-item.active{background:var(--gl);border-left:3px solid var(--g)}
.convo-av{width:38px;height:38px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.convo-info{flex:1;min-width:0}
.convo-name{font-size:12px;font-weight:600;margin-bottom:1px}
.convo-preview{font-size:11px;color:var(--mu);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.convo-meta{text-align:right;flex-shrink:0}
.convo-time{font-size:10px;color:var(--li);margin-bottom:3px}
.convo-badge{background:var(--g);color:#fff;border-radius:99px;font-size:9px;font-weight:700;padding:2px 6px;display:inline-block}
.chat-main{display:flex;flex-direction:column;background:var(--off)}
.chat-topbar{padding:12px 20px;border-bottom:1px solid var(--br);background:#fff;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.chat-topbar-av{width:36px;height:36px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.chat-topbar-name{font-size:14px;font-weight:600}
.chat-topbar-sub{font-size:11px;color:var(--g);font-weight:500;margin-top:1px}
.chat-topbar-acts{display:flex;gap:8px;margin-left:auto}
.chat-act{padding:7px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;font-family:'Inter',sans-serif}
.chat-act-g{background:var(--g);color:#fff;border:none}.chat-act-g:hover{background:var(--gd)}
.chat-act-o{background:#fff;color:var(--bl);border:1px solid var(--br)}.chat-act-o:hover{border-color:var(--bl)}
.prop-ref-bar{display:flex;align-items:center;gap:10px;padding:8px 20px;background:#f0f9f5;border-bottom:1px solid #c8e4d6;flex-shrink:0}
.prop-ref-img{width:40px;height:30px;object-fit:cover;border:1px solid #c8e4d6;flex-shrink:0}
.prop-ref-txt{font-size:11px;color:var(--g);font-weight:600}
.prop-ref-addr{font-size:11px;color:var(--mu)}
.chat-msgs{flex:1;overflow-y:auto;padding:20px 20px 10px;display:flex;flex-direction:column;gap:3px}
.msg-group{display:flex;flex-direction:column;margin-bottom:14px}.msg-group.me{align-items:flex-end}
.msg-row{display:flex;align-items:flex-end;gap:7px}.msg-row.me{flex-direction:row-reverse}
.msg-av-sm{width:26px;height:26px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.msg-av-sm.me-av{background:#1e6b45}
.bubble{padding:9px 14px;font-size:13px;line-height:1.55;max-width:460px}
.bubble.them{background:#fff;border:1px solid var(--br)}.bubble.me{background:var(--g);color:#fff}
.date-divider{display:flex;align-items:center;gap:10px;margin:14px 0}
.date-div-line{flex:1;height:1px;background:var(--br)}
.date-div-txt{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--li);white-space:nowrap}
.sys-msg-chat{text-align:center;font-size:11px;color:var(--mu);background:rgba(30,107,69,.08);border:1px solid rgba(30,107,69,.15);padding:6px 14px;margin:6px auto;max-width:380px}
.chat-input-area{padding:14px 20px;background:#fff;border-top:1px solid var(--br)}
.chat-input-row{display:flex;border:1px solid var(--br)}.chat-input-row:focus-within{border-color:var(--g)}
.chat-input-row textarea{flex:1;padding:11px 14px;background:#fff;border:none;font-size:13px;font-family:'Inter',sans-serif;color:var(--bl);outline:none;resize:none;height:44px;line-height:1.5}
.chat-input-row textarea::placeholder{color:var(--li)}
.chat-send-wrap{display:flex;align-items:flex-end;padding:6px 6px 6px 0}
.chat-send{padding:9px 18px;background:var(--g);color:#fff;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border:none;cursor:pointer;height:32px;display:flex;align-items:center}.chat-send:hover{background:var(--gd)}
.chat-hint{font-size:10px;color:var(--li);margin-top:5px}
.prof-drop{z-index:9999!important;position:fixed!important;top:56px!important;right:8px!important}
.prof-drop.on{display:block!important;background:#fff!important;opacity:1!important}
main{flex:1;display:flex;flex-direction:column}
@media(max-width:768px){.chat-page-wrap{grid-template-columns:1fr}.convo-list{display:none}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="m-overlay" id="mOv" onclick="closeMenu()"></div>
<div class="side-menu" id="sMenu">
  <div class="sm-top"><span class="sm-title">Home Finder</span><button class="sm-x" onclick="closeMenu()">×</button></div>
  <div class="sm-nav" id="sm-nav">
    <button class="sm-item" onclick="location.href='messages.html'">Messages</button>
    <div class="sm-div"></div>
    <button class="sm-item" onclick="goBack()">My Dashboard</button>
    <button class="sm-item" onclick="authLogout()">Sign Out</button>
  </div>
  <div class="sm-foot"><span>© 2025 Home Finder</span></div>
</div>

<nav>
  <div class="nav-left"><button class="hbtn" onclick="openMenu()"><span></span><span></span><span></span></button></div>
  <div class="nav-center"><button class="logo" onclick="goBack()">Home Finder</button></div>
  <div class="nav-right">
    <div class="prof-wrap">
      <div class="prof-btn" id="prof-btn" style="background:#1a4a6b" onclick="toggleProf()">?</div>
      <div class="prof-drop" id="prof-drop">
        <div class="pd-head"><div class="pd-name" id="pd-name">User</div><div class="pd-role" id="pd-role">Member</div></div>
        <button class="pd-item" onclick="closePd();openProfileModal()">Edit Profile</button>
        <button class="pd-item" onclick="authLogout()">Sign Out</button>
      </div>
    </div>
  </div>
</nav>

<main>
  <div class="chat-page-wrap">
    <div class="convo-list">
      <div class="convo-hdr"><h3>Messages</h3><p>Your conversations</p></div>
      <div class="convo-search"><input type="text" placeholder="Search…" oninput="filterConvos(this.value)"/></div>
      <div class="convo-items" id="convo-items"></div>
    </div>
    <div class="chat-main">
      <div class="chat-topbar" id="chat-topbar"></div>
      <div class="prop-ref-bar" id="prop-ref-bar"></div>
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-input-area">
        <div class="chat-input-row">
          <textarea id="chat-input" placeholder="Type a message…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
          <div class="chat-send-wrap"><button class="chat-send" onclick="sendMsg()">Send</button></div>
        </div>
        <div class="chat-hint">Enter to send · Shift+Enter for new line</div>
      </div>
    </div>
  </div>
</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const USER = getUser();
if(!USER) location.href = 'index.html';

if(USER){
  const pb = document.getElementById('prof-btn');
  pb.textContent = USER.initials;
  if(USER.role==='buyer') pb.style.background='#1a4a6b';
  else if(USER.role==='admin') pb.style.background='#6b1a1a';
  else pb.style.background='var(--g)';
  document.getElementById('pd-name').textContent = USER.name;
  document.getElementById('pd-role').textContent = USER.role.charAt(0).toUpperCase()+USER.role.slice(1);
  if(USER.role==='buyer'){
    document.getElementById('sm-nav').innerHTML=
      '<button class="sm-item" onclick="location.href=\'home.html\'">Home</button>'+
      '<button class="sm-item" onclick="location.href=\'messages.html\'">Messages</button>'+
      '<div class="sm-div"></div>'+
      '<button class="sm-item" onclick="location.href=\'buyer-dash.html\'">My Dashboard</button>'+
      '<button class="sm-item" onclick="authLogout()">Sign Out</button>';
  }
}

function goBack(){
  if(!USER){location.href='index.html';return;}
  if(USER.role==='seller') location.href='seller-dash.html';
  else if(USER.role==='admin') location.href='admin-dash.html';
  else location.href='home.html';
}

// ── Socket.io ──
const socket = io('http://localhost:3000');
socket.emit('join', USER._id);
socket.on('receiveMessage', (data) => {
  // If this message belongs to active convo, render it
  if(activeOtherID === data.senderID){
    const msgs = document.getElementById('chat-msgs');
    msgs.innerHTML += buildBubble({me:false, text:data.content, time:now()}, data.senderInitials||'?', '#1e6b45');
    msgs.scrollTop = msgs.scrollHeight;
  }
  loadConversations(); // refresh list
});

// ── State ──
let CONVOS = [];
let activeOtherID = null;

function now(){
  const t=new Date();
  return t.getHours()+':'+String(t.getMinutes()).padStart(2,'0');
}

// ── Load conversations ──
async function loadConversations(){
  try{
    const res = await apiGetConversations();
    CONVOS = (res.conversations || []).sort((a,b)=>{
      const aLast = a.messages[a.messages.length-1]?.createdAt||0;
      const bLast = b.messages[b.messages.length-1]?.createdAt||0;
      return new Date(bLast) - new Date(aLast);
    });
    renderConvoList();
    // If coming from listing page with a seller to contact
    const targetID = sessionStorage.getItem('hf_msg_target');
    const targetListingID = sessionStorage.getItem('hf_msg_listing');
    if(targetID){
      sessionStorage.removeItem('hf_msg_target');
      sessionStorage.removeItem('hf_msg_listing');
      const c = CONVOS.find(c=>c.other._id===targetID);
      if(c) openConvo(c.other._id);
      else {
        renderEmptyChat('Send a message to start the conversation.');
        document.getElementById('chat-input').focus();
        // Store target so sendMsg knows who to message first time
        window._pendingReceiverID = targetID;
        window._pendingListingID = targetListingID || null;
      }
    } else if(CONVOS.length>0){
      openConvo(CONVOS[0].other._id);
    } else {
      renderEmptyChat('No conversations yet.');
    }
  } catch(e){
    console.error(e);
    renderEmptyChat('Could not load messages. Make sure the backend is running.');
  }
}

function renderConvoList(filter=''){
  const filtered = CONVOS.filter(c=>!filter||c.other.name.toLowerCase().includes(filter.toLowerCase()));
  const html = filtered.map(c=>{
    const last = c.messages[c.messages.length-1];
    const preview = last ? last.content.slice(0,40) : 'No messages yet';
    const t = last ? new Date(last.createdAt).toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'}) : '';
    const initials = c.other.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
    const isActive = c.other._id === activeOtherID;
    const avColor = c.other.role==='admin'?'#6b1a1a':c.other.role==='buyer'?'#1a4a6b':'#1e6b45';
    return `<div class="convo-item${isActive?' active':''}" onclick="openConvo('${c.other._id}')">
      <div class="convo-av" style="background:${avColor}">${initials}</div>
      <div class="convo-info"><div class="convo-name">${c.other.name}</div><div class="convo-preview">${esc(preview)}</div></div>
      <div class="convo-meta"><div class="convo-time">${t}</div>${c.unread>0?`<span class="convo-badge">${c.unread}</span>`:''}</div>
    </div>`;
  }).join('');
  document.getElementById('convo-items').innerHTML = html||'<p style="padding:20px;font-size:12px;color:var(--li);text-align:center">No conversations</p>';
}

function filterConvos(v){ renderConvoList(v); }

async function openConvo(otherID){
  activeOtherID = otherID;
  const c = CONVOS.find(x=>x.other._id===otherID);
  if(!c) return;
  // Mark read
  apiMarkRead(otherID).catch(()=>{});
  c.unread = 0;
  renderConvoList();

  const initials = c.other.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  const role = c.other.role==='seller'?'Verified Seller':c.other.role==='admin'?'Administrator':'Buyer';
  const avatarColor = c.other.role==='admin'?'#6b1a1a':c.other.role==='buyer'?'#1a4a6b':'#1e6b45';
  const listing = c.listing;

  document.getElementById('chat-topbar').innerHTML=`
    <div class="chat-topbar-av" style="background:${avatarColor}">${initials}</div>
    <div><div class="chat-topbar-name">${c.other.name}</div><div class="chat-topbar-sub">● ${role}</div></div>
    <div class="chat-topbar-acts"><button class="chat-act chat-act-o" onclick="goBack()">← Back</button></div>`;

  document.getElementById('prop-ref-bar').innerHTML = listing
    ? `<div><div class="prop-ref-txt">${listing.title||listing.location}</div><div class="prop-ref-addr">${listing.location||''}</div></div>`
    : '';

  let html = `<div class="date-divider"><div class="date-div-line"></div><div class="date-div-txt">Conversation</div><div class="date-div-line"></div></div>`;
  html += `<div class="sys-msg-chat">You are connected with ${c.other.name}${listing?' about '+( listing.title||listing.location):''}</div>`;

  c.messages.forEach(m=>{
    const isMe = m.senderID._id===USER._id || m.senderID===USER._id;
    html += buildBubble({me:isMe, text:m.content, time:new Date(m.createdAt).toLocaleTimeString('el-GR',{hour:'2-digit',minute:'2-digit'})}, isMe?USER.initials:initials, avatarColor);
  });

  const box = document.getElementById('chat-msgs');
  box.innerHTML = html;
  box.scrollTop = box.scrollHeight;
}

function buildBubble({me, text, time}, initials, color){
  const ui = USER.initials||'?';
  const myColor = USER.role==='admin'?'#6b1a1a':USER.role==='seller'?'#1e6b45':'#1a4a6b';
  return `<div class="msg-group${me?' me':''}">
    <div class="msg-row${me?' me':''}">
      ${!me?`<div class="msg-av-sm" style="background:${color}">${initials}</div>`:'<div style="width:26px"></div>'}
      <div class="bubble ${me?'me':'them'}">${esc(text)}</div>
      ${me?`<div class="msg-av-sm me-av" style="background:${myColor}">${ui}</div>`:'<div style="width:26px"></div>'}
      <span style="font-size:10px;color:var(--li)">${time}</span>
    </div>
  </div>`;
}

async function sendMsg(){
  const inp = document.getElementById('chat-input');
  const txt = inp.value.trim();
  if(!txt) return;
  // Set activeOtherID from pending if not set yet
  if(!activeOtherID && window._pendingReceiverID){
    activeOtherID = window._pendingReceiverID;
  }
  if(!activeOtherID) return;
  inp.value = '';

  const c = CONVOS.find(x=>x.other._id===activeOtherID);
  const listingID = c?.listing?._id||window._pendingListingID||null;

  try{
    const res = await apiSendMessage({receiverID:activeOtherID, listingID, content:txt});
    const m = res.message;
    if(c){ c.messages.push(m); c.unread=0; }
    socket.emit('sendMessage',{receiverID:activeOtherID, senderID:USER._id, content:txt, senderInitials:USER.initials});
    const msgs = document.getElementById('chat-msgs');
    msgs.innerHTML += buildBubble({me:true, text:txt, time:now()}, '', '');
    msgs.scrollTop = msgs.scrollHeight;
    window._pendingReceiverID = null;
    window._pendingListingID = null;
    const keepID = activeOtherID;
    await loadConversations();
    if(keepID) openConvo(keepID);
  } catch(e){ toast('Could not send message.'); }
}

function renderEmptyChat(msg){
  document.getElementById('chat-topbar').innerHTML='';
  document.getElementById('prop-ref-bar').innerHTML='';
  document.getElementById('chat-msgs').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--mu);font-size:13px">${msg}</div>`;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function openMenu(){document.getElementById('mOv').classList.add('on');document.getElementById('sMenu').classList.add('on');}
function closeMenu(){document.getElementById('mOv').classList.remove('on');document.getElementById('sMenu').classList.remove('on');}
function closePd(){document.getElementById('prof-drop').classList.remove('on');}
function toggleProf(){document.getElementById('prof-drop').classList.toggle('on');}
document.addEventListener('click',e=>{if(!e.target.closest('.prof-wrap'))closePd();});
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),3000);}
function om(id){document.getElementById(id).classList.add('on');}
function cm(id){document.getElementById(id).classList.remove('on');}
function openProfileModal(){
  if(!USER) return;
  const nm=USER.name.split(' ');
  document.getElementById('ep-fn').value=nm[0]||'';
  document.getElementById('ep-ln').value=nm[1]||'';
  document.getElementById('ep-email').value=USER.email||'';
  const phoneField = document.getElementById('ep-phone');
  if(phoneField) phoneField.closest('.fg').style.display = USER.role==='admin' ? 'none' : '';
  if(phoneField) phoneField.value='';
  const companyField = document.getElementById('company-field');
  if(companyField) companyField.style.display = USER.role==='seller' ? '' : 'none';
  const companyInput = document.getElementById('ep-company');
  if(companyInput) companyInput.value = USER.agencyName||'';
  document.getElementById('ep-oldpw').value='';
  document.getElementById('ep-newpw').value='';
  document.getElementById('ep-conpw').value='';
  document.getElementById('profileMod').classList.add('on');
}
function saveProfile(){
  const fn=document.getElementById('ep-fn').value.trim();
  const ln=document.getElementById('ep-ln').value.trim();
  const email=document.getElementById('ep-email').value.trim();
  const oldpw=document.getElementById('ep-oldpw').value;
  const newpw=document.getElementById('ep-newpw').value;
  const conpw=document.getElementById('ep-conpw').value;
  const err=document.getElementById('prof-err');
  err.style.display='none';
  if(!fn||!ln){err.textContent='First and last name are required.';err.style.display='block';return;}
  if(/\d/.test(fn)||/\d/.test(ln)){err.textContent='Name cannot contain numbers.';err.style.display='block';return;}
  if(oldpw||newpw||conpw){
    if(!oldpw){err.textContent='Enter your current password.';err.style.display='block';return;}
    if(newpw.length<8){err.textContent='New password must be at least 8 characters.';err.style.display='block';return;}
    if(newpw!==conpw){err.textContent='Passwords do not match.';err.style.display='block';return;}
  }
  USER.name=fn+' '+ln;
  const company = document.getElementById('ep-company');
  if(company && USER.role==='seller') USER.agencyName = company.value.trim();
  USER.initials=(fn[0]+ln[0]).toUpperCase();
  if(email) USER.email=email;
  saveUser(USER);
  document.getElementById('prof-btn').textContent=USER.initials;
  document.getElementById('pd-name').textContent=USER.name;
  cm('profileMod');
  toast('Profile saved!');
}

loadConversations();
</script>

<!-- EDIT PROFILE MODAL -->
<div class="ov" id="profileMod">
  <div class="modal" style="max-width:440px;border-radius:16px;overflow:hidden;background:rgba(255,255,255,0.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)">
    <div class="modal-hdr">
      <button class="modal-back" onclick="cm('profileMod')">← Back</button>
      <h2>Edit Profile</h2>
      <span style="width:60px"></span>
    </div>
    <div class="modal-body">
      <div id="prof-err" class="emsg"></div>
      <div class="frow">
        <div class="fg"><label class="fl">First Name</label><input type="text" class="fi" id="ep-fn"/></div>
        <div class="fg"><label class="fl">Last Name</label><input type="text" class="fi" id="ep-ln"/></div>
      </div>
      <div class="fg"><label class="fl">Email</label><input type="email" class="fi" id="ep-email"/></div>
      <div class="fg"><label class="fl">Phone</label><input type="tel" class="fi" id="ep-phone" placeholder="+30 69X XXX XXXX" oninput="this.value=this.value.replace(/[^0-9+\s\-]/g,'').slice(0,20)"/></div>
      <div class="fg" id="company-field" style="display:none"><label class="fl">Company Name</label><input type="text" class="fi" id="ep-company" placeholder="Your agency name"/></div>
      <div class="fdiv"><div class="fdl"></div><div class="fdt">Change Password</div><div class="fdl"></div></div>
      <div class="fg"><label class="fl">Current Password</label><input type="password" class="fi" id="ep-oldpw" placeholder="Enter current password"/></div>
      <div class="frow">
        <div class="fg"><label class="fl">New Password</label><input type="password" class="fi" id="ep-newpw" placeholder="Min 8 characters"/></div>
        <div class="fg"><label class="fl">Confirm</label><input type="password" class="fi" id="ep-conpw" placeholder="Repeat password"/></div>
      </div>
      <div class="macts">
        <button class="bfu bfu-g" style="max-width:140px" onclick="saveProfile()">Save Changes</button>
        <button class="bfu bfu-o" style="max-width:110px" onclick="cm('profileMod')">Cancel</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
